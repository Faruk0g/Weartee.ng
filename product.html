<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WearTee.ng | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000;
            --bg: #ffffff;
            --white: #ffffff;
            --transition: all 0.3s ease;
            --danger: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--primary);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1.5px;
        }

        .logo a {
            text-decoration: none;
            color: #000;
            transition: color 0.2s ease;
            letter-spacing: 0.02em;
        }

        .logo a:hover {
            color: #666;
        }

        .cart-btn {
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 2px solid #000;
            padding-bottom: 2px;
        }

        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px 20px;
        }

        .card {
            background: var(--white);
            transition: var(--transition);
            position: relative;
        }

        .img-box {
            width: 100%;
            height: 420px;
            overflow: hidden;
            background: #f9f9f9;
            border-radius: 4px;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .card:hover img {
            opacity: 0.8;
        }

        .stock-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            z-index: 10;
            border-radius: 2px;
        }

        .sold-out-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            z-index: 5;
        }

        .card-info {
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-name {
            font-size: 12px;
            font-weight: 400;
            text-transform: lowercase;
            color: #666;
        }

        .price {
            font-weight: 700;
            font-size: 14px;
        }

        /* SIZE SELECTOR STYLE */
        .size-selector {
            width: 100%;
            padding: 8px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #eee;
            outline: none;
            background: #fff;
            cursor: pointer;
        }

        .add-to-cart-action {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #000;
            padding: 12px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }

        .card:hover .add-to-cart-action {
            background: #000;
            color: #fff;
        }

        .card.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        /* --- SIDEBAR CART --- */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 420px;
            height: 100%;
            background: var(--white);
            z-index: 1001;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 30px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            border-bottom: 1px solid #f9f9f9;
            padding-bottom: 15px;
        }

        .cart-item img {
            width: 70px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #f4f4f4;
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 10px;
            text-decoration: underline;
            cursor: pointer;
            width: fit-content;
            margin-top: 5px;
        }

        .cart-footer {
            padding: 30px;
            border-top: 1px solid #eee;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .whatsapp-btn {
            width: 100%;
            padding: 20px;
            background: #000;
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .clear-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #999;
            border: 1px solid #eee;
            font-weight: 600;
            cursor: pointer;
            font-size: 10px;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
        }

        .overlay.active {
            display: block;
        }

        @media (max-width: 600px) {
            .cart-sidebar {
                width: 100%;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px 10px;
            }

            .img-box {
                height: 260px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay"></div>

    <header>
        <div class="logo"><a href="#">WearTee.ng</a></div>
        <div class="cart-btn" id="cart-open">cart (<span id="cart-count">0</span>)</div>
    </header>

    <div class="container">
        <div class="grid" id="product-grid"></div>
    </div>

    <div class="cart-sidebar" id="sidebar">
        <div class="cart-header">
            <h3 style="text-transform: uppercase; font-size: 14px; letter-spacing: 1px;">Shopping Cart</h3>
            <span id="cart-close"
                style="cursor:pointer; font-size: 11px; font-weight: 800; text-transform: uppercase;">Close</span>
        </div>
        <div class="cart-items" id="cart-list"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cart-total">₦0</span>
            </div>
            <button class="whatsapp-btn" onclick="sendWhatsApp()">CHECKOUT VIA WHATSAPP</button>
            <button class="clear-btn" onclick="clearCart()">CLEAR CART</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "black tee 01", price: 10000, img: "images/black tees (1).JPG" },
            { id: 2, name: "grey tee 01", price: 10000, img: "images/grey tees .JPG" },
            { id: 3, name: "black tee 02", price: 10000, img: "images/black tees (3).JPG" },
            { id: 4, name: "black tee 03", price: 10000, img: "images/black tees (4).JPG" },
            { id: 5, name: "black tee 04", price: 10000, img: "images/black tees (5).JPG" },
            { id: 6, name: "black tee 05", price: 10000, img: "images/black tees (6).JPG" },
            { id: 7, name: "trucker cap 01", price: 15000, img: "images/cap (1).JPG" },
            { id: 8, name: "urban cap 01", price: 10000, img: "images/cap (2).JPG" },
            { id: 9, name: "classic cap 01", price: 15000, img: "images/cap (3).JPG" },
            { id: 10, name: "white cap 01", price: 15000, img: "images/cap (4).JPG", stock: 0 },
            { id: 11, name: "snapback 01", price: 15000, img: "images/snapback (1).JPG" },
            { id: 12, name: "snapback 02", price: 15000, img: "images/snapback (4).JPG" },
            { id: 13, name: "snapback 03", price: 15000, img: "images/snapback (5).JPG" },
            { id: 14, name: "snapback 04", price: 15000, img: "images/snapback (6).JPG", stock: 0 },
            { id: 15, name: "snapback 05", price: 15000, img: "images/snapback (7).JPG", stock: 0 },
            { id: 16, name: "snapback 06", price: 15000, img: "images/snapback (8).JPG", stock: 0 },
            { id: 17, name: "snapback 07", price: 15000, img: "images/snapback (9).JPG", stock: 0 },
            { id: 18, name: "snapback 08", price: 15000, img: "images/snapback (10).JPG", stock: 0 },
            { id: 19, name: "jersey 01", price: 7000, img: "images/jersey.JPG", stock: 0 },
            { id: 20, name: "jersey 02", price: 7000, img: "images/jersey (2).JPG", stock: 0 },
            { id: 21, name: "jersey 03", price: 7000, img: "images/jersey (3).JPG", stock: 0 },
            { id: 21, name: "jersey 04", price: 7000, img: "images/IMG_5093.JPG", stock: 0 },
            { id: 21, name: "jersey 05", price: 7000, img: "images/IMG_5097.JPG", stock: 0 },
            { id: 22, name: "free pant", price: 4000, img: "images/IMG_4723.JPG", stock: 2 },
            { id: 23, name: "free pant", price: 4000, img: "images/IMG_4724.JPG", stock: 2 },
            { id: 24, name: "lounge pant", price: 6000, img: "images/IMG_4725.JPG", stock: 0 },
            { id: 25, name: "joggers", price: 8000, img: "images/IMG_4726.JPG" },
            { id: 26, name: "jersey 03", price: 10000, img: "images/IMG_4727.JPG" },
            { id: 27, name: "jersey 03", price: 10000, img: "images/IMG_4728.JPG" },
            { id: 28, name: "jersey 03", price: 10000, img: "images/IMG_4729.JPG" },
            { id: 29, name: "jersey 03", price: 10000, img: "images/IMG_4730.JPG" },
            { id: 30, name: "jersey 03", price: 10000, img: "images/IMG_4743.JPG" },
            { id: 31, name: "jersey 03", price: 10000, img: "images/IMG_4750.JPG" },
            { id: 31, name: "jersey 03", price: 10000, img: "images/IMG_5088.JPG" },
            { id: 31, name: "jersey 03", price: 10000, img: "images/IMG_5089.JPG" },
        ];

        let cart = JSON.parse(localStorage.getItem('weartee_cart')) || [];

        const grid = document.getElementById('product-grid');

        function renderProducts() {
            grid.innerHTML = products.map(p => {
                const isSoldOut = p.stock === 0;
                const isLowStock = p.stock > 0 && p.stock <= 5;

                return `
                <div class="card ${isSoldOut ? 'disabled' : ''}">
                    <div class="img-box">
                        ${isLowStock ? `<div class="stock-badge">Only ${p.stock} left</div>` : ''}
                        ${isSoldOut ? `<div class="sold-out-overlay">Sold Out</div>` : ''}
                        <img src="${p.img}">
                    </div>
                    <div class="card-info">
                        <div class="info-row">
                            <span class="brand-name">weartee.ng</span>
                            <span class="price">₦${p.price.toLocaleString()}</span>
                        </div>
                        
                        <select class="size-selector" id="size-${p.id}" ${isSoldOut ? 'disabled' : ''}>
                            <option value="S">Small (S)</option>
                            <option value="M" selected>Medium (M)</option>
                            <option value="L">Large (L)</option>
                            <option value="XL">Extra Large (XL)</option>
                            <option value="XXL">Double XL (XXL)</option>
                        </select>

                        <div class="add-to-cart-action" onclick="addToCart(${p.id})">
                            ${isSoldOut ? 'Out of Stock' : 'Add to Cart'}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const size = document.getElementById(`size-${id}`).value;

            // Check Stock
            const itemsInCartOfThisSize = cart.filter(i => i.id === id && i.size === size);
            const currentQty = itemsInCartOfThisSize.reduce((acc, curr) => acc + curr.qty, 0);

            if (product.stock !== undefined && currentQty >= product.stock) {
                alert(`Sorry, we only have ${product.stock} of these available in this size.`);
                return;
            }

            // Find item with same ID AND same size
            const item = cart.find(i => i.id === id && i.size === size);

            if (item) {
                item.qty++;
            } else {
                cart.push({ ...product, size: size, qty: 1 });
            }

            updateUI();
            toggleCart(true);
        }

        function removeFromCart(id, size) {
            cart = cart.filter(i => !(i.id === id && i.size === size));
            updateUI();
        }

        function clearCart() {
            if (cart.length === 0) return;
            if (confirm("Clear all items from your cart?")) {
                cart = [];
                updateUI();
            }
        }

        function updateUI() {
            localStorage.setItem('weartee_cart', JSON.stringify(cart));
            const cartList = document.getElementById('cart-list');
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);

            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = `₦${total.toLocaleString()}`;

            cartList.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <img src="${i.img}" alt="${i.name}">
                    <div class="item-details">
                        <span style="font-weight:700; font-size:13px; text-transform:uppercase;">${i.name}</span>
                        <span style="font-size:11px; color:#333; font-weight:600;">SIZE: ${i.size}</span>
                        <span style="font-size:12px; color:#666;">₦${i.price.toLocaleString()} × ${i.qty}</span>
                        <button class="remove-btn" onclick="removeFromCart(${i.id}, '${i.size}')">REMOVE</button>
                    </div>
                    <div style="font-weight:700; font-size:13px;">₦${(i.price * i.qty).toLocaleString()}</div>
                </div>
            `).join('');
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            let phoneNumber = "2348000000000"; // REPLACE WITH YOUR NUMBER
            let message = "*New Order from WearTee.ng*%0A%0A";

            cart.forEach(i => {
                message += `- ${i.name.toUpperCase()} [Size: ${i.size}] (x${i.qty}): ₦${(i.price * i.qty).toLocaleString()}%0A`;
            });

            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            message += `%0A*Total Amount: ₦${total.toLocaleString()}*`;
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
        }

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleCart(show) {
            sidebar.classList.toggle('active', show);
            overlay.classList.toggle('active', show);
        }
        document.getElementById('cart-open').onclick = () => toggleCart(true);
        document.getElementById('cart-close').onclick = () => toggleCart(false);
        overlay.onclick = () => toggleCart(false);

        renderProducts();
        updateUI();
    </script>

</body>

</html>
