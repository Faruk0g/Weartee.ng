<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WearTee.ng | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000;
            --bg: #ffffff;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--primary);
        }

        /* --- HEADER --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1.5px;
            text-transform: lowercase;
        }

        .cart-btn {
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 2px solid #000;
            padding-bottom: 2px;
        }

        /* --- PRODUCT GRID --- */
        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px 20px;
        }

        .card {
            background: var(--white);
            transition: var(--transition);
            cursor: pointer;
        }

        .img-box {
            width: 100%;
            height: 420px;
            overflow: hidden;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .card:hover img {
            opacity: 0.8;
        }

        .card-info {
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-name {
            font-size: 12px;
            font-weight: 400;
            text-transform: lowercase;
            color: #666;
        }

        .price {
            font-weight: 700;
            font-size: 14px;
        }

        .add-to-cart-action {
            margin-top: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        .card:hover .add-to-cart-action {
            background: #000;
            color: #fff;
        }

        /* --- SIDEBAR CART --- */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 420px;
            height: 100%;
            background: var(--white);
            z-index: 1001;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            padding: 30px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        /* New Cart Item Style with Image */
        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            border-bottom: 1px solid #f9f9f9;
            padding-bottom: 15px;
        }

        .cart-item img {
            width: 70px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #f4f4f4;
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 10px;
            text-decoration: underline;
            cursor: pointer;
            width: fit-content;
            margin-top: 5px;
        }

        .remove-btn:hover {
            color: #000;
        }

        .cart-footer {
            padding: 30px;
            border-top: 1px solid #eee;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .whatsapp-btn {
            width: 100%;
            padding: 20px;
            background: #000;
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
        }

        .overlay.active {
            display: block;
        }

        @media (max-width: 600px) {
            .cart-sidebar {
                width: 100%;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px 10px;
            }

            .img-box {
                height: 260px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay"></div>

    <header>
        <div class="logo">weartee.ng</div>
        <div class="cart-btn" id="cart-open">cart (<span id="cart-count">0</span>)</div>
    </header>

    <div class="container">
        <div class="grid" id="product-grid"></div>
    </div>

    <div class="cart-sidebar" id="sidebar">
        <div class="cart-header">
            <h3 style="text-transform: uppercase; font-size: 14px; letter-spacing: 1px;">Shopping Cart</h3>
            <span id="cart-close"
                style="cursor:pointer; font-size: 11px; font-weight: 800; text-transform: uppercase;">Close</span>
        </div>
        <div class="cart-items" id="cart-list">
        </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cart-total">₦0</span>
            </div>
            <button class="whatsapp-btn" onclick="sendWhatsApp()">CHECKOUT VIA WHATSAPP</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "black tee 01", price: 10000, img: "images/black tees (1).JPG" },
            { id: 2, name: "grey tee 01", price: 10000, img: "images/grey tees .JPG" },
            { id: 3, name: "black tee 02", price: 10000, img: "images/black tees (3).JPG" },
            { id: 4, name: "black tee 03", price: 10000, img: "images/black tees (4).JPG" },
            { id: 5, name: "black tee 04", price: 10000, img: "images/black tees (5).JPG" },
            { id: 6, name: "black tee 05", price: 10000, img: "images/black tees (6).JPG" },
            { id: 7, name: "trucker cap 01", price: 15000, img: "images/cap (1).JPG" },
            { id: 8, name: "urban cap 01", price: 7000, img: "images/cap (2).JPG" },
            { id: 9, name: "classic cap 01", price: 15000, img: "images/cap (3).JPG" },
            { id: 10, name: "white cap 01", price: 15000, img: "images/cap (4).JPG" },
            { id: 11, name: "snapback 01", price: 15000, img: "images/snapback (1).JPG" },
            { id: 12, name: "snapback 02", price: 15000, img: "images/snapback (4).JPG" },
            { id: 13, name: "snapback 03", price: 15000, img: "images/snapback (5).JPG" },
            { id: 14, name: "snapback 04", price: 15000, img: "images/snapback (6).JPG" },
            { id: 15, name: "snapback 05", price: 15000, img: "images/snapback (7).JPG" },
            { id: 16, name: "snapback 06", price: 15000, img: "images/snapback (8).JPG" },
            { id: 17, name: "snapback 07", price: 15000, img: "images/snapback (9).JPG" },
            { id: 18, name: "snapback 08", price: 15000, img: "images/snapback (10).JPG" },
            { id: 19, name: "jersey 01", price: 7000, img: "images/jersey.JPG" },
            { id: 20, name: "jersey 02", price: 7000, img: "images/jersey (2).JPG" },
            { id: 21, name: "jersey 03", price: 7000, img: "images/jersey (3).JPG" }
        ];

        let cart = [];

        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => `
        <div class="card" onclick="addToCart(${p.id})">
            <div class="img-box"><img src="${p.img}"></div>
            <div class="card-info">
                <div class="info-row">
                    <span class="brand-name">weartee.ng</span>
                    <span class="price">₦${p.price.toLocaleString()}</span>
                </div>
                <div class="add-to-cart-action">Add to Cart</div>
            </div>
        </div>
    `).join('');

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const item = cart.find(i => i.id === id);
            if (item) { item.qty++ } else { cart.push({ ...product, qty: 1 }) }
            updateUI();
            toggleCart(true);
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            const cartList = document.getElementById('cart-list');
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);

            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = `₦${total.toLocaleString()}`;

            cartList.innerHTML = cart.map(i => `
            <div class="cart-item">
                <img src="${i.img}" alt="${i.name}">
                <div class="item-details">
                    <span style="font-weight:700; font-size:13px; text-transform:uppercase;">${i.name}</span>
                    <span style="font-size:12px; color:#666;">₦${i.price.toLocaleString()} × ${i.qty}</span>
                    <button class="remove-btn" onclick="event.stopPropagation(); removeFromCart(${i.id})">REMOVE</button>
                </div>
                <div style="font-weight:700; font-size:13px;">₦${(i.price * i.qty).toLocaleString()}</div>
            </div>
        `).join('');
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            let phoneNumber = "2348000000000"; // REPLACE WITH YOUR NUMBER
            let message = "*New Order from WearTee.ng*%0A%0A";
            cart.forEach(i => { message += `- ${i.name.toUpperCase()} (x${i.qty}): ₦${(i.price * i.qty).toLocaleString()}%0A`; });
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            message += `%0A*Total Amount: ₦${total.toLocaleString()}*`;
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
        }

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleCart(show) {
            sidebar.classList.toggle('active', show);
            overlay.classList.toggle('active', show);
        }
        document.getElementById('cart-open').onclick = () => toggleCart(true);
        document.getElementById('cart-close').onclick = () => toggleCart(false);
        overlay.onclick = () => toggleCart(false);
    </script>

</body>

</html>
